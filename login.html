<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Experience Next Gen</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-container"></div>
    <div class="particles" id="particles"></div>
    
    <main class="glass-panel login-panel">
        <div class="content-wrapper">
            <h1 class="title" style="font-size: 3rem;">Welcome <span class="gradient-text">Back</span></h1>
            <p class="subtitle" style="font-size: 1rem; margin-bottom: 2rem;">Please enter your credentials to access your account.</p>
            
            <form class="login-form" id="loginForm">
                <div id="login-error" style="color: #ff4b4b; background: rgba(255, 75, 75, 0.1); padding: 0.5rem; border-radius: 8px; font-size: 0.9rem; display: none; text-align: center;"></div>
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    <span>Sign In</span>
                </button>
                
                <p style="margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
                    Don't have an account? <a href="#" style="color: #a855f7; text-decoration: none;">Sign up</a>
                </p>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
