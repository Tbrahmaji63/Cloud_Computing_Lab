<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Experience Next Gen</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-container"></div>
    <div class="particles" id="particles"></div>

    <main class="glass-panel login-panel">
        <div class="content-wrapper">
            <h1 class="title" style="font-size: 3rem;">Welcome <span class="gradient-text">Back</span></h1>
            <p class="subtitle" style="font-size: 1rem; margin-bottom: 2rem;">Please enter your credentials to access
                your account.</p>

            <form class="login-form" id="loginForm">
                <div id="login-error"
                    style="color: #ff4b4b; background: rgba(255, 75, 75, 0.1); padding: 0.5rem; border-radius: 8px; font-size: 0.9rem; display: none; text-align: center;">
                </div>
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    <span>Sign In</span>
                </button>

                <div class="divider"
                    style="display: flex; align-items: center; text-align: center; margin: 1.5rem 0; color: var(--text-secondary);">
                    <div style="flex: 1; border-bottom: 1px solid var(--glass-border);"></div>
                    <span style="padding: 0 10px; font-size: 0.9rem;">OR</span>
                    <div style="flex: 1; border-bottom: 1px solid var(--glass-border);"></div>
                </div>

                <!-- Google SSO -->
                <script src="https://accounts.google.com/gsi/client" async></script>
                <div id="g_id_onload"
                    data-client_id="767758536293-7csr119ta3p2l7iq5ak19683vv1ndgqn.apps.googleusercontent.com"
                    data-callback="handleCredentialResponse" data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline"
                    data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"
                    style="display: flex; justify-content: center;">
                </div>

                <p style="margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
                    Don't have an account? <a href="#" style="color: #a855f7; text-decoration: none;">Sign up</a>
                </p>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
