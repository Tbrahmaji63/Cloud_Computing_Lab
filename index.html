<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to the Future</title>
    <meta name="description" content="A premium and sleek welcome page featuring dark mode and glassmorphism.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-container"></div>
    <div class="particles" id="particles"></div>
    
    <main class="glass-panel">
        <div class="content-wrapper">
            <span class="badge">Version 2.0</span>
            <h1 class="title">Next Gen<br/><span class="gradient-text">Experiences</span></h1>
            <p class="subtitle">Step into a vibrant world of immersive interaction, driven by seamless performance and premium modern aesthetics.</p>
            
            <div class="action-group">
                <button class="btn btn-primary" id="explore-btn">
                    <span>Explore Now</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 5L19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <a href="/route" class="btn btn-secondary" style="text-decoration: none;">Logout</a>
            </div>
        </div>

        <div class="features">
            <div class="feature-card">
                <div class="icon">✨</div>
                <h3>Dynamic</h3>
                <p>Silky smooth animations.</p>
            </div>
            <div class="feature-card">
                <div class="icon">🚀</div>
                <h3>Fast</h3>
                <p>Lightning-quick load speeds.</p>
            </div>
            <div class="feature-card">
                <div class="icon">💎</div>
                <h3>Premium</h3>
                <p>Exquisite typography & design.</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
